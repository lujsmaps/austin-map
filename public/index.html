<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austin Startup & VC Map</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg-color: #e4e4e2;
            --ink: #000000;
            --paper: #ffffff;
            --border-w: 2px;
            --vc-color: #cc0000;
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-color);
            color: var(--ink);
            font-family: var(--font-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        }

        /* ─── Header ─────────────────────────────────────────── */
        .app-header {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: var(--border-w) solid var(--ink);
            padding-bottom: 8px;
        }

        .app-title {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.06em;
            line-height: 0.85;
            text-transform: uppercase;
            color: var(--ink);
        }

        .app-title span {
            display: block;
            font-size: 0.25em;
            letter-spacing: 0.05em;
            font-weight: 700;
            margin-top: 4px;
        }

        .meta-data-top {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: right;
            max-width: 220px;
            line-height: 1.3;
        }

        .meta-data-top .count {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            display: block;
            margin-bottom: 2px;
        }

        /* ─── Dashboard Grid ─────────────────────────────────── */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: var(--border-w);
            background-color: var(--ink);
            border: var(--border-w) solid var(--ink);
            flex-grow: 1;
            min-height: 600px;
        }

        .panel {
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ─── Sidebar ────────────────────────────────────────── */
        .sidebar {
            padding: 16px;
            overflow-y: auto;
        }

        .panel-header {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 8px;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        /* ─── Detail Card ────────────────────────────────────── */
        .detail-card {
            border: var(--border-w) solid var(--ink);
            padding: 14px;
            margin-bottom: 16px;
            background: var(--paper);
            display: none;
        }

        .detail-card.visible {
            display: block;
        }

        .detail-card .d-name {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            margin-bottom: 4px;
            line-height: 1.1;
        }

        .detail-card .d-type-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 2px 6px;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
        }

        .detail-card .d-type-badge.startup {
            background: var(--ink);
            color: var(--paper);
        }

        .detail-card .d-type-badge.vc {
            background: var(--vc-color);
            color: var(--paper);
        }

        .detail-card .d-desc {
            font-size: 11px;
            line-height: 1.4;
            margin-bottom: 10px;
            color: #333;
        }

        .detail-card .d-link {
            font-size: 10px;
            font-weight: 700;
            color: var(--ink);
            text-decoration: none;
            border-bottom: 1px solid var(--ink);
            padding-bottom: 1px;
        }

        .detail-card .d-link:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .detail-close {
            float: right;
            background: none;
            border: none;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            font-family: var(--font-primary);
        }

        /* ─── Search Box ─────────────────────────────────────── */
        .search-box {
            border: var(--border-w) solid var(--ink);
            padding: 8px 10px;
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: var(--font-primary);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            outline: none;
            letter-spacing: 0.02em;
        }

        .search-box input::placeholder {
            color: #999;
        }

        /* ─── Data Stream ────────────────────────────────────── */
        .data-stream {
            font-size: 10.5px;
            line-height: 1.3;
            letter-spacing: -0.01em;
            text-align: justify;
            margin-bottom: 12px;
        }

        .data-entry {
            display: inline;
        }

        .data-entry::after {
            content: " \2014 ";
            font-weight: 900;
            margin: 0 2px;
        }

        .data-entry:last-child::after {
            content: "";
        }

        .d-label {
            font-weight: 900;
            text-transform: uppercase;
        }

        .d-value {
            font-weight: 400;
            color: #222;
        }

        .d-status {
            background: var(--ink);
            color: var(--bg-color);
            padding: 0 4px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 9px;
            vertical-align: middle;
            margin-left: 2px;
        }

        .d-status.vc {
            background: var(--vc-color);
            color: var(--paper);
        }

        /* ─── Main Content: Entity Grid ──────────────────────── */
        .entity-grid-panel {
            padding: 16px;
            overflow-y: auto;
        }

        .entity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: var(--border-w);
            background-color: var(--ink);
        }

        .entity-card {
            background: var(--bg-color);
            padding: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: background 0.1s;
        }

        .entity-card:hover {
            background: var(--paper);
        }

        .entity-card.selected {
            background: var(--ink);
            color: var(--bg-color);
        }

        .entity-card.selected .ec-desc,
        .entity-card.selected .ec-url {
            color: #aaa;
        }

        .ec-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .ec-name {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 1.15;
            flex: 1;
        }

        .ec-badge {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 2px 5px;
            letter-spacing: 0.05em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ec-badge.startup {
            background: var(--ink);
            color: var(--paper);
        }

        .ec-badge.vc {
            background: var(--vc-color);
            color: var(--paper);
        }

        .entity-card.selected .ec-badge.startup {
            background: var(--paper);
            color: var(--ink);
        }

        .ec-desc {
            font-size: 10px;
            line-height: 1.35;
            color: #555;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ec-url {
            font-size: 9px;
            font-weight: 700;
            color: #888;
            text-transform: lowercase;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ec-id {
            font-size: 9px;
            font-family: monospace;
            font-weight: 700;
            color: #999;
        }

        .entity-card.selected .ec-id {
            color: #666;
        }

        /* ─── Stats Row ──────────────────────────────────────── */
        .stats-row {
            display: flex;
            gap: var(--border-w);
            background: var(--ink);
            border-bottom: var(--border-w) solid var(--ink);
        }

        .stat-cell {
            flex: 1;
            background: var(--bg-color);
            padding: 10px 14px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .stat-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        /* ─── Controls Bar ───────────────────────────────────── */
        .controls-bar {
            margin-top: var(--border-w);
            border: var(--border-w) solid var(--ink);
            display: flex;
        }

        .btn {
            flex: 1;
            background: transparent;
            border: none;
            border-right: var(--border-w) solid var(--ink);
            padding: 12px;
            font-family: var(--font-primary);
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--ink);
            cursor: pointer;
            text-align: center;
        }

        .btn:last-child {
            border-right: none;
        }

        .btn:hover,
        .btn.active {
            background: var(--ink);
            color: var(--bg-color);
        }

        /* ─── Loading ─────────────────────────────────────────── */
        .loading-msg {
            text-align: center;
            padding: 60px 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 12px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .error-msg {
            text-align: center;
            padding: 40px 20px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 11px;
            color: var(--vc-color);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        /* ─── Responsive ─────────────────────────────────────── */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            body {
                padding: 12px;
            }

            .app-title {
                font-size: clamp(2rem, 12vw, 4rem);
            }
        }
    </style>
</head>

<body>

    <header class="app-header">
        <h1 class="app-title">
            ATX MAP
            <span>Austin Startups & Venture Capital</span>
        </h1>
        <div class="meta-data-top">
            <span class="count" id="totalCount">—</span>
            Entities Tracked<br>
            System Active<br>
            Austin, TX
        </div>
    </header>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
        <div class="stat-cell">
            <div class="stat-number" id="statTotal">—</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-cell">
            <div class="stat-number" id="statStartups">—</div>
            <div class="stat-label">Startups</div>
        </div>
        <div class="stat-cell">
            <div class="stat-number" id="statVCs">—</div>
            <div class="stat-label">VC Firms</div>
        </div>
    </div>

    <main class="dashboard-grid">
        <!-- Sidebar -->
        <section class="panel sidebar">
            <h2 class="panel-header">
                <span>Intel Feed</span>
            </h2>

            <!-- Detail card -->
            <div class="detail-card" id="detailCard">
                <button class="detail-close" id="detailClose">&times;</button>
                <div class="d-name" id="detailName"></div>
                <div class="d-type-badge" id="detailType"></div>
                <div class="d-desc" id="detailDesc"></div>
                <a class="d-link" id="detailLink" href="#" target="_blank">Visit Website →</a>
            </div>

            <div class="search-box">
                <span style="font-size:11px;font-weight:900;">⌕</span>
                <input type="text" id="searchInput" placeholder="Search entities...">
            </div>

            <div class="data-stream" id="dataStream"></div>
        </section>

        <!-- Entity Grid -->
        <section class="panel entity-grid-panel" id="gridPanel">
            <div class="loading-msg" id="loadingMsg">Acquiring Targets...</div>
            <div class="entity-grid" id="entityGrid" style="display:none;"></div>
        </section>
    </main>

    <nav class="controls-bar">
        <button class="btn active" data-filter="all">All Entities</button>
        <button class="btn" data-filter="startup">Startups</button>
        <button class="btn" data-filter="vc">VC Firms</button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        // ── Config ──────────────────────────────────────────────
        const SUPABASE_URL = 'https://ufyzjboktehlkyudtyvk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmeXpqYm9rdGVobGt5dWR0eXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTQzNTcsImV4cCI6MjA4OTk3MDM1N30.AxAURMHhiOIrNU0mR3sbc8uJu6AhmnQZNWtOKR1c2Sg';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ── State ───────────────────────────────────────────────
        let allOrgs = [];
        let filteredOrgs = [];
        let selectedId = null;
        let currentFilter = 'all';

        // ── DOM refs ────────────────────────────────────────────
        const entityGrid = document.getElementById('entityGrid');
        const loadingMsg = document.getElementById('loadingMsg');
        const dataStream = document.getElementById('dataStream');
        const detailCard = document.getElementById('detailCard');
        const searchInput = document.getElementById('searchInput');

        // ── Fetch data (exclude PostGIS location column) ────────
        async function fetchOrganizations() {
            const { data, error } = await sb
                .from('organizations')
                .select('id,name,type,website,description,logo_url,address,city,state,founded_year,stage,employee_count,exa_source_url,created_at')
                .order('name', { ascending: true });

            if (error) {
                console.error('Supabase error:', error);
                loadingMsg.textContent = 'CONNECTION FAILED — ' + error.message;
                loadingMsg.classList.add('error-msg');
                return [];
            }
            return data || [];
        }

        // ── Truncate domain from URL ────────────────────────────
        function domainOf(url) {
            try {
                return new URL(url).hostname.replace(/^www\./, '');
            } catch { return url; }
        }

        // ── Render entity grid ──────────────────────────────────
        function renderGrid() {
            entityGrid.innerHTML = '';
            entityGrid.style.display = 'grid';
            loadingMsg.style.display = 'none';

            if (filteredOrgs.length === 0) {
                loadingMsg.textContent = 'NO ENTITIES FOUND';
                loadingMsg.style.display = 'block';
                entityGrid.style.display = 'none';
                return;
            }

            filteredOrgs.forEach((org, i) => {
                const card = document.createElement('div');
                card.className = `entity-card${org.id === selectedId ? ' selected' : ''}`;
                card.dataset.id = org.id;

                const desc = org.description
                    ? org.description.slice(0, 200)
                    : 'No description available';

                const url = org.website ? domainOf(org.website) : '—';

                card.innerHTML = `
                <div class="ec-header">
                    <div class="ec-name">${org.name}</div>
                    <div class="ec-badge ${org.type}">${org.type === 'vc' ? 'VC' : 'Startup'}</div>
                </div>
                <div class="ec-desc">${desc}</div>
                <div class="ec-url">${url}</div>
                <div class="ec-id">#${String(i + 1).padStart(3, '0')}</div>
            `;

                card.addEventListener('click', () => selectEntity(org.id));
                entityGrid.appendChild(card);
            });
        }

        // ── Render data stream ──────────────────────────────────
        function renderDataStream() {
            const sample = filteredOrgs.slice(0, 12);
            dataStream.innerHTML = sample.map(org => {
                const sc = org.type === 'vc' ? ' vc' : '';
                return `<span class="data-entry"><span class="d-label">ID</span> <span class="d-value">${org.name}</span> <span class="d-status${sc}">${org.type.toUpperCase()}</span></span>`;
            }).join('');
        }

        // ── Update stats ────────────────────────────────────────
        function updateStats() {
            const total = allOrgs.length;
            const startups = allOrgs.filter(o => o.type === 'startup').length;
            const vcs = allOrgs.filter(o => o.type === 'vc').length;

            document.getElementById('totalCount').textContent = filteredOrgs.length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statStartups').textContent = startups;
            document.getElementById('statVCs').textContent = vcs;
        }

        // ── Select entity ───────────────────────────────────────
        function selectEntity(id) {
            selectedId = id;
            const org = allOrgs.find(o => o.id === id);
            if (!org) return;

            document.getElementById('detailName').textContent = org.name;
            const badge = document.getElementById('detailType');
            badge.textContent = org.type === 'vc' ? 'Venture Capital' : 'Startup';
            badge.className = `d-type-badge ${org.type}`;
            document.getElementById('detailDesc').textContent = org.description || 'No description available.';

            const link = document.getElementById('detailLink');
            if (org.website) {
                link.href = org.website;
                link.style.display = 'inline';
            } else {
                link.style.display = 'none';
            }
            detailCard.classList.add('visible');
            renderGrid();
        }

        document.getElementById('detailClose').addEventListener('click', () => {
            selectedId = null;
            detailCard.classList.remove('visible');
            renderGrid();
        });

        // ── Filter ──────────────────────────────────────────────
        function applyFilter(filter) {
            currentFilter = filter;
            filteredOrgs = filter === 'all'
                ? [...allOrgs]
                : allOrgs.filter(o => o.type === filter);

            document.getElementById('totalCount').textContent = filteredOrgs.length;

            document.querySelectorAll('.controls-bar .btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });

            renderGrid();
            renderDataStream();
        }

        // ── Search ──────────────────────────────────────────────
        searchInput.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if (!q) { applyFilter(currentFilter); return; }

            filteredOrgs = allOrgs
                .filter(o => currentFilter === 'all' || o.type === currentFilter)
                .filter(o =>
                    o.name?.toLowerCase().includes(q) ||
                    o.description?.toLowerCase().includes(q) ||
                    o.website?.toLowerCase().includes(q)
                );

            document.getElementById('totalCount').textContent = filteredOrgs.length;
            renderGrid();
            renderDataStream();
        });

        // ── Button handlers ─────────────────────────────────────
        document.querySelectorAll('.controls-bar .btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.filter) applyFilter(btn.dataset.filter);
            });
        });

        // ── Init ────────────────────────────────────────────────
        async function init() {
            allOrgs = await fetchOrganizations();
            filteredOrgs = [...allOrgs];

            console.log(`Loaded ${allOrgs.length} organizations`);

            if (allOrgs.length === 0) {
                loadingMsg.textContent = 'NO DATA FOUND';
                return;
            }

            updateStats();
            renderGrid();
            renderDataStream();
        }

        init();
    </script>

</body>

</html>
